<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com data:; img-src 'self' data:;">
  <title>DL-Processor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- First-run wizard. Hidden by default; app.js will show it if needed. -->
  <div id="first-run-wizard" hidden>
    <div class="wizard-card">
      <h1>Welcome to DL-Processor</h1>
      <p class="muted">Where should DL-Processor store its data?</p>
      <div class="folder-row">
        <input id="wizard-folder" type="text" placeholder="Type a path or click Choose…">
        <button id="wizard-pick">Choose…</button>
      </div>
      <div id="wizard-legacy" hidden>
        <p>We found an existing DL-Processor install at <code id="wizard-legacy-path"></code>.</p>
        <label><input type="checkbox" id="wizard-migrate" checked> Copy <code>db/ input/ output/ sf-input/ config/</code> from the old install</label>
      </div>
      <div class="wizard-actions">
        <button id="wizard-continue" class="primary">Continue</button>
      </div>
    </div>
  </div>

  <!-- App shell (visible after wizard completes). Tasks 7-12 fill this in. -->
  <div id="app-shell" hidden>
    <header class="top-bar">
      <span class="brand">DL-Processor</span>
      <select id="project-selector"><option value="">All projects</option></select>
      <span class="data-folder" id="header-data-folder"></span>
      <span class="spacer"></span>
      <button id="btn-settings" class="icon-btn" title="Settings">⚙</button>
    </header>
    <main>
      <aside class="sidebar" id="sidebar">
        <button class="cmd-btn cmd-btn-primary" data-cmd="all" data-label="Full pipeline">⚡ Run full pipeline <span class="hint">(does 1–4)</span></button>
        <div class="sidebar-section">Monthly steps</div>
        <button class="cmd-btn" data-cmd="import-dld" data-label="Import DLD"><span class="step-num">1</span><span class="step-body">📥 Import DLD</span></button>
        <button class="cmd-btn" data-cmd="import-sf"  data-label="Import SF"><span class="step-num">2</span><span class="step-body">📥 Import Salesforce</span></button>
        <button class="cmd-btn" data-cmd="compare"    data-label="Compare"><span class="step-num">3</span><span class="step-body">🔍 Compare</span></button>
        <button class="cmd-btn" data-cmd="diff"       data-label="Diff (month-over-month)"><span class="step-num">4</span><span class="step-body">📊 Diff</span></button>
        <button class="cmd-btn" data-cmd="review-pending" data-label="Review pending"><span class="step-num">5</span><span class="step-body">📝 Review pending</span></button>
        <button class="cmd-btn" data-cmd="apply-pending"  data-label="Apply pending"
                data-needs-file="true"><span class="step-num">6</span><span class="step-body">✅ Apply pending</span></button>
        <div class="sidebar-section">View</div>
        <button class="cmd-btn" data-cmd="status"   data-label="Status">📈 Status</button>
        <button class="cmd-btn" data-cmd="projects" data-label="Projects">🏢 Projects</button>
      </aside>
      <section class="content">
        <div class="tab-host" id="tab-host"></div>
        <div class="log-panel" id="log-panel">
          <p class="muted" style="padding:8px">Log lines stream here once Task 7 wires the sidebar.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="sidebar.js"></script>
  <script src="tab-host.js"></script>
  <script src="top-bar.js"></script>
  <script src="settings-modal.js"></script>
  <script src="app.js"></script>
</body>
</html>
